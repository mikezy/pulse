<!doctype html>
<html><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- ts is the epoch second at render time; +30 makes the next URL distinct so GitHub Pages CDN can't serve a cached copy on refresh -->
  <meta http-equiv="refresh" content="30; url=https://mikezy.github.io/pulse/?t=1779545442">
  <title>Pulse</title>
  <style>
    /* Tuned for Kindle Colorsoft (~1264x1680 physical / 632x840 CSS px, 7" portrait).
       Yellow/amber ramp — Kaleido pulls low-saturation pastels toward gray, so
       L1 jumps straight to a saturated butter yellow (NOT a pale wash) to stay
       visibly different from the empty L0 gray. */
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      background: #fff;
      color: #232F3E;
      padding: 18px 28px 14px;
    }

    /* HEADER */
    .head { text-align: center; margin-bottom: 14px; }
    h1 {
      font-size: 44px; margin: 0; letter-spacing: 8px; font-weight: bold;
      color: #232F3E;
    }
    h1 .dot { color: #E08E00; }
    .sub { font-style: italic; color: #E08E00; font-size: 16px; margin-top: 4px; letter-spacing: 1px; }

    /* SECTION HEADERS */
    h2 {
      margin: 16px 0 10px; font-size: 12px; letter-spacing: 4px;
      text-align: center; font-weight: bold; color: #232F3E;
      border-bottom: 1px solid #E08E00; padding-bottom: 5px;
    }

    /* GRIDS */
    .grid { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .grid td {
      padding: 9px 4px;
      font-variant-numeric: tabular-nums; vertical-align: top;
      word-wrap: break-word; text-align: center;
    }
    .num { font-size: 24px; font-weight: bold; line-height: 1.15; color: #232F3E; }
    .lbl {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
      color: #545B64; margin-top: 5px;
    }

    /* HEATMAP — 7 rows (days, Mon top → Sun bottom) × 5 cols (weeks, oldest → current).
       Yellow/amber ramp. Each step holds saturation so it survives Kaleido's
       gray-bias compression. L1 is full butter yellow, not a pale wash. */
    .heatwrap { display: flex; gap: 8px; align-items: stretch; padding: 2px 12px 0; }
    .daylabels {
      display: flex; flex-direction: column; justify-content: space-around;
      font-size: 10px; color: #545B64; padding: 1px 0;
      text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
    }
    .heatgrid { flex: 1; border-collapse: separate; border-spacing: 5px; }
    .heatgrid td { width: 14.28%; height: 24px; border-radius: 3px; }
    .h0 { background: #EBEDF0; }            /* empty — pale gray */
    .h1 { background: #FFE066; }            /* butter yellow — saturated */
    .h2 { background: #FFB300; }            /* amber */
    .h3 { background: #E08E00; }            /* deep amber */

    .footer {
      font-size: 15px; color: #232F3E; margin-top: 14px;
      text-align: center; font-style: italic;
      border-top: 1px solid #F2F3F3; padding-top: 10px;
    }
    .footer .stamp {
      display: block; font-size: 11px; color: #545B64;
      font-style: normal; letter-spacing: 1px; margin-top: 5px;
    }
  </style>
</head><body>

  <div class="head">
    <h1>PULSE<span class="dot">.</span></h1>
    <div class="sub">Heartbeat of your work</div>
  </div>

  <h2>SYSTEM</h2>
  <table class="grid"><tr>
    <td><div class="num">7.7%</div><div class="lbl">CPU</div></td>
    <td><div class="num">17.3/51.5</div><div class="lbl">RAM (GB)</div></td>
    <td><div class="num">13/494</div><div class="lbl">DISK (GB)</div></td>
    <td><div class="num">100%<span style="font-size:14px;"> AC</span></div><div class="lbl">BATTERY</div></td>
  </tr></table>

  <h2>CLAUDE CODE &middot; 4 WEEKS</h2>
  <table class="grid">
    <tr>
      <td><div class="num">684</div><div class="lbl">Sessions</div></td>
      <td><div class="num">27,185</div><div class="lbl">Messages</div></td>
      <td><div class="num">1.93B</div><div class="lbl">Tokens</div></td>
    </tr>
    <tr>
      <td><div class="num">16/28</div><div class="lbl">Active days</div></td>
      <td><div class="num">17:00</div><div class="lbl">Peak hour</div></td>
      <td><div class="num">opus-4-7</div><div class="lbl">Top model</div></td>
    </tr>
  </table>

  <h2>4-WEEK ACTIVITY</h2>
  <div class="heatwrap">
    <div class="daylabels">
      <span>M</span><span>T</span><span>W</span><span>T</span>
      <span>F</span><span>S</span><span>S</span>
    </div>
    <table class="heatgrid">
      
      <tr><td class="h0"></td><td class="h0"></td><td class="h0"></td><td class="h2"></td><td class="h2"></td></tr>
      
      <tr><td class="h0"></td><td class="h0"></td><td class="h0"></td><td class="h2"></td><td class="h2"></td></tr>
      
      <tr><td class="h0"></td><td class="h0"></td><td class="h1"></td><td class="h3"></td><td class="h1"></td></tr>
      
      <tr><td class="h0"></td><td class="h0"></td><td class="h2"></td><td class="h3"></td><td class="h2"></td></tr>
      
      <tr><td class="h0"></td><td class="h0"></td><td class="h1"></td><td class="h2"></td><td class="h3"></td></tr>
      
      <tr><td class="h0"></td><td class="h0"></td><td class="h1"></td><td class="h0"></td><td class="h0"></td></tr>
      
      <tr><td class="h0"></td><td class="h0"></td><td class="h1"></td><td class="h2"></td><td class="h0"></td></tr>
      
    </table>
  </div>

  <div class="footer">
    &ldquo;Small steps, every day.&rdquo;
    <span class="stamp">Updated 2026-05-23 07:10</span>
  </div>

</body></html>
